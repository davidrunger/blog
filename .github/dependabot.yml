---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: cron
      cronjob: "4 4 * * *"
      timezone: America/Chicago
    cooldown:
      default-days: 5
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: cron
      cronjob: "4 4 * * *"
      timezone: America/Chicago
    cooldown:
      default-days: 5
    open-pull-requests-limit: 20
    allow:
      - dependency-type: all
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: cron
      cronjob: "4 4 * * *"
      timezone: America/Chicago
    cooldown:
      default-days: 5
    open-pull-requests-limit: 20
