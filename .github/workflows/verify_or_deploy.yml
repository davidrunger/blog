on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify_or_deploy:
    concurrency:
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
      group: verify_or_deploy-${{ github.ref_name }}
    runs-on: ubuntu-latest
    name: Verify deployability (and maybe deploy)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          bundler-cache: true

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'

      - name: Install Gems
        run: bundle install

      - name: Run RuboCop
        run: bin/rubocop --format clang

      - name: Install JavaScript Packages
        run: pnpm install

      - name: Build
        run: bin/bridgetown deploy
        env:
          BRIDGETOWN_ENV: production

      - name: Check compiled CSS
        run: bin/check-compiled-css

      - name: Move 'output/' to 'blog/'
        run: mv output blog

      - name: Launch server
        run: ./node_modules/.bin/serve --no-clipboard > /dev/null &

      - name: Take Percy snapshots
        run: ./node_modules/.bin/percy snapshot snapshots.yml
        env:
          PERCY_TOKEN: '${{secrets.PERCY_TOKEN}}'

      - name: Deploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: ./.github/actions/deploy
        with:
          SERVER_USER_AND_IP: ${{ secrets.SERVER_USER_AND_IP }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
