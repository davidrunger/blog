on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify_or_deploy:
    concurrency:
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
      group: verify_or_deploy-${{ github.ref_name }}
    runs-on: ubuntu-latest
    name: Verify deployability (and maybe deploy)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          bundler-cache: true

      - name: Install pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
        with:
          version: 10
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'

      - name: Install Gems
        run: bundle install

      - name: Run RuboCop
        run: bin/rubocop --format clang

      - name: Install JavaScript Packages
        run: pnpm install

      - name: Build
        run: bin/bridgetown deploy
        env:
          BRIDGETOWN_ENV: production

      - name: Check compiled CSS
        run: bin/check-compiled-css

      - name: Move 'output/' to 'blog/'
        run: mv output blog

      - name: Launch server
        run: ./node_modules/.bin/serve --no-clipboard > /dev/null &

      - name: Take Percy snapshots
        run: ./node_modules/.bin/percy snapshot snapshots.yml
        env:
          PERCY_TOKEN: '${{secrets.PERCY_TOKEN}}'

      - name: Deploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: ./.github/actions/deploy
        with:
          SERVER_USER_AND_IP: ${{ secrets.SERVER_USER_AND_IP }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
